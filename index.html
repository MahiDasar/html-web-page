<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Cool Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn {
            background: white;
            color: #333;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Hello GitHub!</h1>
        <p>This is my first stylish web page</p>

        <button class="btn" onclick="showMessage()">Click Me</button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerText =
                "🎉 You just clicked a button!";
        }
    </script>

</body>
</html>
